runtime: python39
instance_class: F2

handlers:
- url: /static
  static_dir: static
  secure: always

- url: /.*
  script: auto
  secure: always

env_variables:
  SECRET_KEY: 'your-production-secret-key-change-this'
  FLASK_ENV: 'production'

# For production database (PostgreSQL)
# beta_settings:
#   cloud_sql_instances: 'your-project:your-region:your-instance'

# Automatic scaling
automatic_scaling:
  target_cpu_utilization: 0.65
  min_instances: 1
  max_instances: 10

# Health checks
health_check:
  enable_health_check: True
  check_interval_sec: 5
  timeout_sec: 4
  unhealthy_threshold: 2
  healthy_threshold: 2
  restart_threshold: 60

# Network settings
network:
  session_affinity: true